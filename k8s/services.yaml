---
# PostgreSQL Headless Service (for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: 9router
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
# PostgreSQL ClusterIP Service (for app access)
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: 9router
spec:
  clusterIP: 10.96.0.100
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
# 9Router ClusterIP Service
apiVersion: v1
kind: Service
metadata:
  name: 9router-svc
  namespace: 9router
spec:
  type: ClusterIP
  selector:
    app: 9router
  ports:
    - port: 80
      targetPort: 3000
      name: http
---
# 9Router LoadBalancer Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: 9router-lb
  namespace: 9router
spec:
  type: LoadBalancer
  selector:
    app: 9router
  ports:
    - port: 80
      targetPort: 3000
      name: http
    - port: 443
      targetPort: 3000
      name: https
---
# Ingress (optional)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 9router-ingress
  namespace: 9router
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: 9router.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: 9router-svc
                port:
                  number: 80
