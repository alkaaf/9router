apiVersion: v1
kind: Namespace
metadata:
  name: 9router
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: 9router-config
  namespace: 9router
data:
  NODE_ENV: "production"
  PORT: "20128"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  DATA_DIR: "/app/data"
---
apiVersion: v1
kind: Secret
metadata:
  name: 9router-secrets
  namespace: 9router
type: Opaque
stringData:
  POSTGRES_URL: "postgres://9router:changeme@postgres.9router.svc.cluster.local:5432/9router"
  JWT_SECRET: "change-me-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 9router
  namespace: 9router
  labels:
    app: 9router
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: 9router
  template:
    metadata:
      labels:
        app: 9router
    spec:
      containers:
        - name: 9router
          image: ghcr.io/alkaaf/9router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 20128
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: 9router-secrets
                  key: POSTGRES_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: 9router-secrets
                  key: JWT_SECRET
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: 9router-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: 9router-config
                  key: PORT
            - name: HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: 9router-config
                  key: HOSTNAME
            - name: NEXT_TELEMETRY_DISABLED
              valueFrom:
                configMapKeyRef:
                  name: 9router-config
                  key: NEXT_TELEMETRY_DISABLED
            - name: DATA_DIR
              valueFrom:
                configMapKeyRef:
                  name: 9router-config
                  key: DATA_DIR
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 20128
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 20128
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: data-home
              mountPath: /app/data-home
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: 9router-data
        - name: data-home
          persistentVolumeClaim:
            claimName: 9router-data-home
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 9router-data
  namespace: 9router
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 9router-data-home
  namespace: 9router
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: 9router
  namespace: 9router
  labels:
    app: 9router
spec:
  type: ClusterIP
  selector:
    app: 9router
  ports:
    - name: http
      port: 80
      targetPort: 20128
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 9router
  namespace: 9router
  labels:
    app: 9router
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 9router
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
